name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Bundle JavaScript
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore historia.keystore \
            -alias historiakey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass argentina123 \
            -keypass argentina123 \
            -dname "CN=Historia Argentina Quest, OU=App, O=Imara, L=Buenos Aires, S=BA, C=AR"

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Signing: $APK"
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort | tail -1)/apksigner sign \
            --ks historia.keystore \
            --ks-key-alias historiakey \
            --ks-pass pass:argentina123 \
            --key-pass pass:argentina123 \
            --out android/app/build/outputs/apk/release/historia-argentina-quest.apk \
            "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: historia-argentina-quest-apk
          path: android/app/build/outputs/apk/release/historia-argentina-quest.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Historia Argentina Quest v${{ github.run_number }}"
          body: |
            ### Cómo instalar:
            1. Descargá el `.apk`
            2. Android → Ajustes → Seguridad → activá "Fuentes desconocidas"
            3. Abrí el APK e instalá
          files: android/app/build/outputs/apk/release/historia-argentina-quest.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
